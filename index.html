<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>説明記録 シンプル版</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f5f5f7;
      color: #111;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }
    h1 {
      font-size: 24px;
      margin: 0 0 16px;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    h2 {
      font-size: 18px;
      margin: 0 0 12px;
    }
    label {
      display: block;
      font-size: 14px;
      margin: 10px 0 6px;
      font-weight: 600;
    }
    input, select, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      border-radius: 10px;
    }
    input, select {
      padding: 12px;
      border: 1px solid #cfcfd4;
      background: #fff;
    }
    button {
      padding: 12px;
      border: 0;
      background: #111;
      color: #fff;
      font-weight: 700;
      margin-top: 12px;
    }
    button.sub {
      background: #666;
    }
    button.light {
      background: #2d6cdf;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .row > * {
      flex: 1 1 200px;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 12px 0 0;
    }
    li {
      padding: 12px 0;
      border-top: 1px solid #ececf1;
    }
    .small {
      color: #666;
      font-size: 13px;
      line-height: 1.5;
    }
    .empty {
      color: #666;
      font-size: 14px;
      padding-top: 6px;
    }
    .pill {
      display: inline-block;
      font-size: 12px;
      background: #efeff4;
      border-radius: 999px;
      padding: 4px 8px;
      margin-bottom: 6px;
    }
    .rowbtn {
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>説明記録 シンプル版</h1>

    <div class="card">
      <h2>1. 名前登録</h2>
      <label for="nameInput">名前</label>
      <input id="nameInput" type="text" placeholder="例: 田中" />
      <button id="addNameBtn" type="button">名前を追加</button>
      <ul id="nameList"></ul>
      <div id="nameEmpty" class="empty">まだ名前がありません</div>
    </div>

    <div class="card">
      <h2>2. 記録</h2>
      <label for="toSelect">誰に説明したか</label>
      <select id="toSelect"></select>
      <button id="saveLogBtn" type="button">この相手で記録</button>
      <div class="small" style="margin-top:8px;">押した時の日時で保存します。記録は「誰に / いつ」だけ残します。</div>
    </div>

    <div class="card">
      <h2>3. 履歴</h2>
      <div class="row">
        <button id="exportJsonBtn" type="button" class="light">JSONを書き出し</button>
        <button id="exportCsvBtn" type="button" class="light">CSVを書き出し</button>
      </div>
      <button id="clearBtn" type="button" class="sub">履歴を全部消す</button>
      <ul id="logList"></ul>
      <div id="logEmpty" class="empty">まだ履歴がありません</div>
    </div>
  </div>

  <script>
    var STORAGE_NAMES = 'simple_names_v2';
    var STORAGE_LOGS = 'simple_logs_v2';

    var nameInput = document.getElementById('nameInput');
    var addNameBtn = document.getElementById('addNameBtn');
    var nameList = document.getElementById('nameList');
    var nameEmpty = document.getElementById('nameEmpty');
    var toSelect = document.getElementById('toSelect');
    var saveLogBtn = document.getElementById('saveLogBtn');
    var logList = document.getElementById('logList');
    var logEmpty = document.getElementById('logEmpty');
    var clearBtn = document.getElementById('clearBtn');
    var exportJsonBtn = document.getElementById('exportJsonBtn');
    var exportCsvBtn = document.getElementById('exportCsvBtn');

    function loadNames() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_NAMES) || '[]');
      } catch (e) {
        return [];
      }
    }

    function saveNames(names) {
      localStorage.setItem(STORAGE_NAMES, JSON.stringify(names));
    }

    function loadLogs() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_LOGS) || '[]');
      } catch (e) {
        return [];
      }
    }

    function saveLogs(logs) {
      localStorage.setItem(STORAGE_LOGS, JSON.stringify(logs));
    }

    function formatDate(iso) {
      var d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      var h = String(d.getHours()).padStart(2, '0');
      var min = String(d.getMinutes()).padStart(2, '0');
      return y + '/' + m + '/' + day + ' ' + h + ':' + min;
    }

    function escapeCsv(value) {
      var text = String(value == null ? '' : value);
      return '"' + text.replace(/"/g, '""') + '"';
    }

    function downloadText(filename, content, type) {
      var blob = new Blob([content], { type: type });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() {
        URL.revokeObjectURL(url);
      }, 1000);
    }

    function renderNames() {
      var names = loadNames();
      nameList.innerHTML = '';
      toSelect.innerHTML = '';

      if (names.length === 0) {
        nameEmpty.style.display = 'block';
        var opt = document.createElement('option');
        opt.value = '';
        opt.textContent = '先に名前を追加してください';
        toSelect.appendChild(opt);
        return;
      }

      nameEmpty.style.display = 'none';
      for (var i = 0; i < names.length; i++) {
        (function(index) {
          var li = document.createElement('li');
          var text = document.createElement('div');
          text.textContent = names[index];
          li.appendChild(text);

          var del = document.createElement('button');
          del.type = 'button';
          del.textContent = '削除';
          del.className = 'sub rowbtn';
          del.onclick = function() {
            var current = loadNames();
            var deletedName = current[index];
            current.splice(index, 1);
            saveNames(current);

            var logs = loadLogs().filter(function(item) {
              return item.to !== deletedName;
            });
            saveLogs(logs);

            renderNames();
            renderLogs();
          };
          li.appendChild(del);
          nameList.appendChild(li);
        })(i);

        var option = document.createElement('option');
        option.value = names[i];
        option.textContent = names[i];
        toSelect.appendChild(option);
      }
    }

    function renderLogs() {
      var logs = loadLogs();
      logList.innerHTML = '';

      if (logs.length === 0) {
        logEmpty.style.display = 'block';
        return;
      }
      logEmpty.style.display = 'none';

      for (var i = logs.length - 1; i >= 0; i--) {
        (function(index) {
          var log = logs[index];
          var li = document.createElement('li');

          var tag = document.createElement('div');
          tag.className = 'pill';
          tag.textContent = '説明記録';
          li.appendChild(tag);

          var text = document.createElement('div');
          text.textContent = log.to + ' / ' + formatDate(log.at);
          li.appendChild(text);

          var del = document.createElement('button');
          del.type = 'button';
          del.textContent = 'この履歴を削除';
          del.className = 'sub rowbtn';
          del.onclick = function() {
            var current = loadLogs();
            current.splice(index, 1);
            saveLogs(current);
            renderLogs();
          };
          li.appendChild(del);
          logList.appendChild(li);
        })(i);
      }
    }

    addNameBtn.onclick = function() {
      var value = nameInput.value.trim();
      if (!value) {
        alert('名前を入力してください');
        return;
      }
      var names = loadNames();
      if (names.indexOf(value) !== -1) {
        alert('同じ名前は登録済みです');
        return;
      }
      names.push(value);
      saveNames(names);
      nameInput.value = '';
      renderNames();
    };

    saveLogBtn.onclick = function() {
      var to = toSelect.value;
      if (!to) {
        alert('説明相手を選んでください');
        return;
      }

      var logs = loadLogs();
      logs.push({
        to: to,
        at: new Date().toISOString()
      });
      saveLogs(logs);
      renderLogs();
      alert('記録しました');
    };

    clearBtn.onclick = function() {
      if (!confirm('履歴を全部消しますか？')) return;
      saveLogs([]);
      renderLogs();
    };

    exportJsonBtn.onclick = function() {
      var data = {
        exportedAt: new Date().toISOString(),
        names: loadNames(),
        logs: loadLogs()
      };
      var filename = 'explain_log_export_' + new Date().toISOString().slice(0, 10) + '.json';
      downloadText(filename, JSON.stringify(data, null, 2), 'application/json;charset=utf-8');
    };

    exportCsvBtn.onclick = function() {
      var logs = loadLogs();
      var lines = ['"誰に","いつ"'];
      for (var i = 0; i < logs.length; i++) {
        lines.push(escapeCsv(logs[i].to) + ',' + escapeCsv(formatDate(logs[i].at)));
      }
      var filename = 'explain_log_export_' + new Date().toISOString().slice(0, 10) + '.csv';
      downloadText(filename, '\uFEFF' + lines.join('\n'), 'text/csv;charset=utf-8');
    };

    renderNames();
    renderLogs();
  </script>
</body>
</html>
